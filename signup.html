<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>FutureSelf – Sign Up</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&family=Figtree:wght@900&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 380px; height: 600px; overflow: hidden; background: #F5EDD8; font-family: 'DM Sans', sans-serif; }
  body { display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; padding: 24px; }
  .blob { position: absolute; bottom: -40px; right: -40px; width: 200px; height: 200px; background: #E8622A; opacity: 0.10; border-radius: 40% 60% 55% 45% / 45% 35% 65% 55%; pointer-events: none; z-index: 0; }
  .card { position: relative; z-index: 1; width: 100%; background: #fff; border: 2px solid #0D0D0D; border-radius: 16px; box-shadow: 6px 6px 0px 0px #0D0D0D; padding: 24px 20px 20px; display: flex; flex-direction: column; gap: 16px; }
  .wordmark { font-family: 'Figtree', sans-serif; font-weight: 900; font-size: 28px; color: #0D0D0D; text-align: center; letter-spacing: -0.02em; }
  .tagline { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.14em; color: #3D3D3A; text-align: center; }
  .tabs { display: flex; background: #EBEBEB; border: 2px solid #0D0D0D; border-radius: 99px; padding: 3px; gap: 3px; }
  .tab { flex: 1; padding: 8px 0; border-radius: 99px; font-size: 12px; font-weight: 700; text-align: center; cursor: pointer; border: none; background: transparent; color: #3D3D3A; transition: all 0.15s; }
  .tab.active { background: #0D0D0D; color: #fff; }
  .field { display: flex; flex-direction: column; gap: 5px; }
  .field label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: #0D0D0D; }
  .field input { background: #F3EACF; border: 2px solid #0D0D0D; border-radius: 8px; padding: 10px 12px; font-family: 'DM Sans', sans-serif; font-size: 13px; color: #0D0D0D; outline: none; transition: border-color 0.15s, box-shadow 0.15s; }
  .field input:focus { border-color: #E8622A; box-shadow: 0 0 0 2px rgba(232,98,42,0.2); }
  .field input::placeholder { color: #aaa; }
  .submit-btn { background: #E8622A; color: #fff; font-family: 'DM Sans', sans-serif; font-weight: 700; font-size: 13px; text-transform: uppercase; letter-spacing: 0.08em; padding: 13px; border: 2px solid #0D0D0D; border-radius: 10px; box-shadow: 4px 4px 0px 0px #0D0D0D; cursor: pointer; width: 100%; transition: transform 0.1s, box-shadow 0.1s; }
  .submit-btn:hover { transform: translate(2px, 2px); box-shadow: 2px 2px 0px 0px #0D0D0D; }
  .submit-btn:active { transform: translate(4px, 4px); box-shadow: none; }
  .footer-tag { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.14em; color: #3D3D3A; text-align: center; opacity: 0.6; }
</style>
</head>
<body>
  <div class="blob"></div>
  <div class="card">
    <div>
      <div class="wordmark">FutureSelf</div>
      <div class="tagline" style="margin-top:4px;">Your PC doesn't have a bedtime. Now it does.</div>
    </div>
    <div class="tabs">
      <button class="tab active" id="tab-signup">Start Free Trial</button>
      <button class="tab" id="tab-login">Log In</button>
    </div>
    <div class="field">
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="you@example.com"/>
    </div>
    <div class="field">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="Min 6 characters"/>
    </div>
    <button class="submit-btn" type="button">Start Free Trial — 3 Days Free →</button>
    <div class="footer-tag">Tomorrow will thank you.</div>
  </div>
</body>
</html>
