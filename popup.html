<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Future Self</title>
  <link href="https://api.fontshare.com/v2/css?f[]=clash-display@600,700&f[]=general-sans@400,500,600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="fs-popup">
    <div class="fs-header">
      <h1>Future Self</h1>
    </div>

    <!-- Not set up yet -->
    <div id="setup-prompt" class="hidden">
      <p class="fs-setup-msg">Let's set up your future self.</p>
      <button class="fs-btn fs-btn-primary" id="btn-setup">Protect My Sleep</button>
    </div>

    <!-- Main dashboard -->
    <div id="dashboard" class="hidden">
      <div class="fs-status-badge" id="status-badge">
        <span class="fs-status-dot" id="status-dot"></span>
        <span class="fs-status-text" id="status-text"></span>
      </div>

      <div class="fs-info-row" id="schedule-info"></div>

      <div class="fs-stats">
        <div class="fs-stat">
          <span class="fs-stat-value" id="streak-count">0</span>
          <span class="fs-stat-label" id="streak-label">nights protected</span>
        </div>
        <div class="fs-stat">
          <span class="fs-stat-value" id="blocked-count">0</span>
          <span class="fs-stat-label">blocked tonight</span>
        </div>
      </div>

      <a class="fs-settings-link" id="settings-link">Settings</a>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
